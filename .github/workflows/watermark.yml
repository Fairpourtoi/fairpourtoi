name: Auto-Watermark New Photos

# Runs automatically whenever new files are pushed into assets/img/incoming/
on:
  push:
    branches: [main]
    paths:
      - 'assets/img/incoming/**'

# Allows this workflow to commit the watermarked images back to the repo
permissions:
  contents: write

jobs:
  watermark:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Pillow
        run: pip install Pillow pillow-avif-plugin

      - name: Watermark new photos
        run: |
          python3 scripts/watermark.py \
            assets/img/incoming \
            assets/img \
            --logo scripts/logo.png \
            --position bottom-left \
            --opacity 0.9 \
            --scale 0.14 \
            --margin 0.16 \
            --color white \
            --glow \
            --glow-blur 8 \
            --glow-opacity 0.7

      - name: Clear processed photos from incoming
        run: |
          find assets/img/incoming -type f \( -iname "*.jpg" -o -iname "*.jpeg" -o -iname "*.png" -o -iname "*.webp" -o -iname "*.avif" \) -delete

      - name: Commit watermarked images
        run: |
          git config user.name "fair-pour-toi-bot"
          git config user.email "actions@github.com"
          git add assets/img
          git diff --cached --quiet || git commit -m "Auto-watermark new photos [skip ci]"
          git push
