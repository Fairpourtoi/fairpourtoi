<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fair Pour Toi — Contemporary Resell Event</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=Jost:wght@300;400&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --cream:#FAF8F6;
  --blush:#E6CCC8;
  --sand:#F6F0E9;
  --warm:#E8DDD6;
  --taupe:#C9B8B0;
  --espresso:#342828;
}
#events, #about, #book, #contact {
  scroll-margin-top: 110px; 
}   
html{scroll-behavior:smooth}
body{font-family:'Jost',sans-serif;font-weight:300;color:var(--espresso);background:var(--cream);-webkit-font-smoothing:antialiased}
img{display:block;max-width:100%}
.serif{font-family:'Cormorant Garamond',serif;font-weight:300}

/* NAV */
nav{position:fixed;top:0;left:0;right:0;z-index:100;background:transparent;transition:background .4s,box-shadow .4s}
nav.scrolled{background:var(--cream);box-shadow:0 1px 0 rgba(52,40,40,.08)}
.nav-inner{max-width:1100px;margin:0 auto;padding:6px 28px;display:flex;justify-content:space-between;align-items:center;gap:16px}
.nav-logo{height:128px;width:auto;filter:brightness(0) invert(1);transition:filter .4s}
nav.scrolled .nav-logo{filter:none}
.nav-links{display:flex;gap:28px;align-items:center}
.nav-links a{font-size:11px;letter-spacing:.14em;text-transform:uppercase;color:rgba(255,255,255,.85);text-decoration:none;transition:color .4s}
nav.scrolled .nav-links a{color:var(--taupe)}
.nav-links a:hover{color:white}
nav.scrolled .nav-links a:hover{color:var(--espresso)}
.nav-cta {
background: rgba(255, 255, 255, .15);
  backdrop-filter: blur(8px);
  border: .5px solid rgba(255, 255, 255, .4);
  color: white;
  font-family: 'Jost', sans-serif;
  font-size: 10px;
  letter-spacing: .16em;
  text-transform: uppercase;
  font-weight: 400;
  padding: 8px 18px;
  cursor: pointer;
  text-decoration: none;
  white-space: nowrap;
  transition: background .4s, color .4s, border-color .4s;
}
nav.scrolled .nav-cta {
  background: #E6CCC8;
  border-color: #E6CCC8;
  color: var(--espresso);
  font-weight: 500;
}
.nav-cta:hover, nav.scrolled .nav-cta:hover {
  background: var(--taupe);
  border-color: var(--taupe);
  color: white;
}
.hamburger{display:none;flex-direction:column;gap:5px;cursor:pointer;background:none;border:none;padding:4px}
.hamburger span{display:block;width:22px;height:.5px;background:white;transition:background .4s}
nav.scrolled .hamburger span{background:var(--espresso)}
.mobile-menu{display:none;flex-direction:column;background:var(--cream);border-top:.5px solid var(--blush)}
.mobile-menu a{padding:14px 28px;font-size:11px;letter-spacing:.14em;text-transform:uppercase;color:var(--taupe);text-decoration:none;border-bottom:.5px solid var(--blush)}
.mobile-menu.open{display:flex}

/* HERO */
.hero{position:relative;min-height:100vh;display:flex;align-items:center;overflow:hidden;background:#1a1010}
.hero-bg{position:absolute;inset:0;z-index:0}

/* Video carousel */
.photo-slide{position:absolute;inset:0;opacity:0;transition:opacity 1.6s ease-in-out; will-change: opacity;
  transform: translateZ(0); z-index:0;background-size:cover;background-position:center}
.photo-slide.active{opacity:1;z-index:1}

/* Carousel dots */
.hero-dots{position:absolute;bottom:36px;left:50%;transform:translateX(-50%);z-index:10;display:flex;gap:8px}
.hero-dot{width:24px;height:.5px;background:rgba(255,255,255,.3);cursor:pointer;transition:background .3s,width .3s}
.hero-dot.active{background:white;width:40px}

/* Slide counter */
.hero-counter{position:absolute;bottom:36px;right:28px;z-index:10;font-size:10px;letter-spacing:.2em;color:rgba(255,255,255,.4)}

.hero-inner{position:relative;z-index:5;max-width:1100px;margin:0 auto;width:100%;padding:200px 28px 80px}
.pill{display:inline-block;background:rgba(255,255,255,.12);backdrop-filter:blur(4px);color:rgba(255,255,255,.9);font-size:10px;letter-spacing:.18em;text-transform:uppercase;padding:5px 14px;border-radius:20px;margin-bottom:24px;border:.5px solid rgba(255,255,255,.2)}
.hero h1{font-size:clamp(44px,7vw,92px);line-height:1.04;max-width:680px;margin-bottom:20px;color:white}
.hero p{font-size:14px;letter-spacing:.06em;color:rgba(255,255,255,.7);max-width:380px;line-height:1.9;margin-bottom:36px}
.btn-row{display:flex;gap:14px;flex-wrap:wrap}
.btn-dark{background:white;color:var(--espresso);font-family:'Jost',sans-serif;font-size:11px;letter-spacing:.16em;text-transform:uppercase;font-weight:400;padding:13px 32px;border:none;cursor:pointer;text-decoration:none;display:inline-block;transition:opacity .2s}
.btn-dark:hover{opacity:.88}
.btn-ghost{background:transparent;color:white;font-family:'Jost',sans-serif;font-size:11px;letter-spacing:.16em;text-transform:uppercase;font-weight:400;padding:12px 32px;border:.5px solid rgba(255,255,255,.5);cursor:pointer;text-decoration:none;display:inline-block;transition:border-color .2s}
.btn-ghost:hover{border-color:white}

/* SHARED */
.eyebrow{font-size:10px;letter-spacing:.2em;text-transform:uppercase;color:var(--taupe);margin-bottom:10px;font-weight:400}
.divider-line{height:.5px;background:var(--blush)}
.section-inner{max-width:1100px;margin:0 auto;padding:80px 28px}
.btn-espresso{background:var(--espresso);color:var(--cream);font-family:'Jost',sans-serif;font-size:11px;letter-spacing:.16em;text-transform:uppercase;font-weight:400;padding:13px 32px;border:none;cursor:pointer;text-decoration:none;display:inline-block}

/* EVENTS */
.events-grid{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-top:32px}
.event-card{background:var(--sand);border:.5px solid var(--blush);padding:32px 28px}
.event-card .date{font-size:28px;margin:6px 0}
.event-card .loc{font-size:11px;color:var(--taupe);letter-spacing:.1em;margin-bottom:24px}

/* BOOK */
.book-bg{background:var(--sand)}
.book-grid{display:grid;grid-template-columns:1fr 1.8fr;gap:60px;align-items:start}
.book-left h2{font-size:clamp(30px,4vw,48px);line-height:1.15;margin-bottom:20px}
.book-detail{display:flex;align-items:center;gap:10px;font-size:11px;color:var(--taupe);letter-spacing:.08em;margin-bottom:12px}
.book-detail svg{width:14px;height:14px;stroke:var(--taupe);fill:none;stroke-width:1.5;flex-shrink:0}
/* NEW ROTATING CAROUSEL */
.soon-carousel{position:relative;height:600px;width:100%;overflow:hidden;background:var(--sand);border:.5px solid var(--blush)}
.soon-slide{position:absolute;inset:0;opacity:0;transition:opacity 1.6s ease-in-out;background-size:cover;background-position:center}
.soon-slide.active{opacity:1}

/* CONTACT */
.form-status {text-align:center; font-size:16px; color:#E6CCC8; margin-top:15px; font-weight:400;}

@media(max-width:768px){
  .nav-links{display:none}
  .hamburger{display:flex}
  .events-grid{grid-template-columns:1fr}
  .book-grid{grid-template-columns:1fr}
}
#slide-0{background-image:url('assets/img/hero-1.jpg');}#slide-1{background-image:url('assets/img/hero-2.jpg');}#slide-2{background-image:url('assets/img/hero-3.jpg');}#slide-3{background-image:url('assets/img/hero-4.jpg');}
</style>
<script type="text/javascript" src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>
</head>
<body>

<!-- NAV -->
<nav id="main-nav">
  <div class="nav-inner">
    <img src="assets/img/logo.png" alt="Fair pour toi" class="nav-logo" width="384" height="384" decoding="async">
    <div class="nav-links">
      <a href="#events">Events</a>
      <a href="#book">Book</a>
      <a href="#contact">Contact</a>
      <a href="https://www.instagram.com/fair.pourtoi" target="_blank" rel="noopener" class="nav-cta">Follow on Instagram</a>
    </div>
    <button class="hamburger" aria-label="Open menu" onclick="toggleMenu()">
      <span></span><span></span><span></span>
    </button>
  </div>
</nav>

<!-- EVENTS -->
<section id="events" style="background:var(--cream)">
  <div class="section-inner">
    <div class="eyebrow">Upcoming events</div>
    <h2 class="serif" style="font-size:42px">Upcoming event dates</h2>
    <div class="events-grid">
      <div class="event-card">
        <div class="eyebrow">Weekend one</div>
        <div class="date serif">Coming this fall</div>
        <div class="loc">Santa Monica, CA</div>
        <a href="#contact" class="btn-espresso" style="font-size:10px;padding:9px 20px">Get Notified</a>
      </div>
      <div class="event-card">
        <div class="eyebrow">Weekend two</div>
        <div class="date serif">Coming this fall</div>
        <div class="loc">Santa Monica, CA</div>
        <a href="#contact" class="btn-espresso" style="font-size:10px;padding:9px 20px">Get Notified</a>
      </div>
    </div>
  </div>
</section>

<div class="divider-line"></div>

<!-- BOOK / SOON -->
<section id="book" class="book-bg">
  <div class="section-inner">
    <div class="book-grid">
      <div class="book-left">
        <div class="eyebrow">Reserve your spot</div>
        <h2 class="serif" style="font-size:48px;">Coming Soon.</h2>
        <div class="book-detail">
          <svg viewBox="0 0 24 24"><path d="M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7z"/><circle cx="12" cy="9" r="2.5"/></svg>
          <span>Santa Monica, CA</span>
        </div>
        <div class="book-detail">
          <svg viewBox="0 0 24 24"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
          <span>Coming Soon</span>
        </div>
      </div>
      
      <!-- Rotating Image Carousel -->
      <div class="soon-carousel">
        <div class="soon-slide active" id="soon-0" style="background-image:url('assets/img/soon-1.jpg')"></div>
        <div class="soon-slide" id="soon-1" style="background-image:url('assets/img/soon-2.jpg')"></div>
        <div class="soon-slide" id="soon-2" style="background-image:url('assets/img/soon-3.jpg')"></div>
        <div class="soon-slide" id="soon-3" style="background-image:url('assets/img/soon-4.jpg')"></div>
      </div>
    </div>
  </div>
</section>

<script>
  // Nav scroll
  window.addEventListener('scroll', () => {
    document.getElementById('main-nav').classList.toggle('scrolled', window.scrollY > 60);
  });

  // Carousel Rotation
  let soonCurrent = 0;
  function nextSoonSlide() {
    document.getElementById('soon-' + soonCurrent).classList.remove('active');
    soonCurrent = (soonCurrent + 1) % 4;
    document.getElementById('soon-' + soonCurrent).classList.add('active');
  }
  setInterval(nextSoonSlide, 5000);
</script>
</body>
</html>
